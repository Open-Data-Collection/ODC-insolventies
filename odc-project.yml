name: insolventies
description: Scraper for Dutch insolvency records from insolventies.rechtspraak.nl
version: "2.0"

source:
  type: api
  url: https://insolventies.rechtspraak.nl

# Three-component pipeline (see nomad/). Discovery runs in the scheduler.
components:
  scheduler: "0 6 * * *"   # daily court sweep → insolventies:tasks
  worker: service          # drains insolventies:tasks → insolventies.raw_cases
  processor: "*/30 * * * *" # raw_cases → processed_cases/publications/documents

queue: insolventies:tasks

storage:
  minio:
    bucket: raw-data
    prefix: insolventies/      # PDFs under insolventies/pdfs/
  clickhouse:
    database: insolventies
    tables:
      - raw_cases
      - processed_cases
      - processed_publications
      - processed_documents

env:
  - REDIS_URL
  - CLICKHOUSE_HOST
  - CLICKHOUSE_USER
  - CLICKHOUSE_PASSWORD
  - STORAGE_MINIO_ENDPOINT
  - STORAGE_MINIO_ACCESS_KEY
  - STORAGE_MINIO_SECRET_KEY
  - ANONYMIZATION_SALT
  - REQUEST_DELAY
