services:
  scraper:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - TASKS_MINIO_ENDPOINT=http://minio:9000
      - TASKS_MINIO_ACCESS_KEY=minioadmin
      - TASKS_MINIO_SECRET_KEY=minioadmin
      - STORAGE_MINIO_ENDPOINT=http://minio:9000
      - STORAGE_MINIO_ACCESS_KEY=minioadmin
      - STORAGE_MINIO_SECRET_KEY=minioadmin
      - ANONYMIZATION_SALT=dev-salt-change-in-production
    depends_on:
      - minio
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  minio-data:
